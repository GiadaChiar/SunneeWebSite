<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
</head>

<body>
    <div id="menu">
        <!--import menu-->
    </div>
    <!--log-in area button to anotother page for revervated area-->

    <!--default after change it-->
    <div id="buttonLinkHTML">
        <a class="btn btn-link">Area Riservata</a>
    </div>

    <!--dinamic second part-->
    <!--log in did all controll and client registration -->
    <div id="loginHTML">
        <h1 id="titleLogIn" class="title">Accesso:</h1>
        <form class="p-4 border rounded bg-light">
            <div class="mb-3">
                <label for="exampleDropdownFormEmail1" class="form-label">Email</label>
                <input type="email" class="form-control" id="exampleDropdownFormEmail1" placeholder="email@example.com">
            </div>
            <div class="mb-3">
                <label for="exampleDropdownFormPassword1" class="form-label">Password</label>
                <input type="password" class="form-control" id="exampleDropdownFormPassword1" placeholder="Password">
            </div>
            <div id="checksection" class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="dropdownCheck">
                <label class="form-check-label" for="dropdownCheck">Salva Password</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">Accedi</button>
            <hr class="my-4">
            <a class="d-block mb-2" id="newRegistration" href="#">Nuovo utente? Registrati</a>
            <a class="d-block" id="forgotPassword" href="#">Password dimenticata?</a>
        </form>
    </div>


    <div id="contacts">
        <!--form.html-->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>

</html>
