<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div id="menu">
        <!--import menu-->
    </div>

    <div id="PopUpHtml"></div>



    <!-- Collapse Filtri -->
    <button class="btn btn-primary" id="filterButton" type="button" data-bs-toggle="collapse"
        data-bs-target="#filterCollapse" aria-expanded="false" aria-controls="filterCollapse">
        Filtri
    </button>

    <div class="collapse" id="filterCollapse">
        <form id="filter">
            <div class="card card-body" id="filterSection">

                <h5>Colore :</h5>
                <ul class="colorFilters">
                    <input class="form-check-input disable" type="radio" data-value="white" name="color">
                    <input class="form-check-input disable" type="radio" data-value="black" name="color">
                    <input class="form-check-input disable" type="radio" data-value="red" name="color">
                    <input class="form-check-input disable" type="radio" data-value="blue" name="color">
                    <input class="form-check-input disable" type="radio" data-value="green" name="color">
                    <input class="form-check-input disable" type="radio" data-value="pink" name="color">
                    <input class="form-check-input disable" type="radio" data-value="floral" name="color">
                    <input class="form-check-input disable" type="radio" data-value="multicolored" name="color">
                </ul>

                <h5>Taglia :</h5>
                <ul class="sizeFiltersShop">
                    <button class="filter-btn disable" data-filter-type="size" data-value="xs" name="size">XS</button>
                    <button class="filter-btn disable" data-filter-type="size" data-value="s" name="size">S</button>
                    <button class="filter-btn disable" data-filter-type="size" data-value="m" name="size">M</button>
                    <button class="filter-btn disable" data-filter-type="size" data-value="l" name="size">L</button>
                    <button class="filter-btn disable" data-filter-type="size" data-value="xl" name="size">XL</button>
                    <button class="filter-btn disable" data-filter-type="size" data-value="2xl" name="size">2XL</button>
                </ul>


                </ul>
                <div class="center">
                    <button type="submit" id="filterSave"  name = "searchFilters" class="btn btn-primary w-100">Cerca</button>
                </div>
            </div>

    </div>

    </form>

    <div id="shopProductHTML">
    </div>

    <div id="contacts">
        <!--form.html-->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
