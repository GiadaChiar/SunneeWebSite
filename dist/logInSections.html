<!--Pop-Up-->
<template id="popUp">
    <div class="popup-overlay" id="custom-popup">
        <div class="popup-box" role="alert">
            <!--<button class="btn-close" id="closeButton" aria-label="Close" type="button"></button>-->
            <h4 id="popUpTitle">Titolo</h4>
            <p id="popUpMessage">Messaggio</p>
        </div>
    </div>
</template>


<template id="popUpSelection">
    <div class="popup-overlay" id="custom-popup">
        <div class="popup-box" role="alert">
            <button class="btn-close" id="closeButton" aria-label="Close" type="button"></button>
            <h4 id="popUpTitle">Titolo</h4>
            <p id="popUpMessage">Messaggio</p>
            <form id="check">
                <div class="form-check">
                    <input class="form-check-input" type="radio" value="yes" name="selection" id="popUCheckright">
                    <label class="form-check-label" for="popUCheckright">
                        Si
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" value="no" name="selection" id="popUCheckleft">
                    <label class="form-check-label" for="popUCheckleft">
                        No
                    </label>
                </div>
                <button id="saveCheck">Salva</button>
            </form>
        </div>
    </div>
</template>






<!--standard Autentication -->

<!--log in did all controll and client registration -->
<template id="registrationTemplate">
    <h1 class="title">Registrazione:</h1>

    <form id="registration" class="p-4 border rounded bg-light">

        <div class="mb-3">
            <label for="name" class="form-label">Nome</label>
            <input type="text" class="form-control" id="name" placeholder="Luca" novalidate>
        </div>
        <div class="mb-3">
            <label for="surname" class="form-label">Cognome</label>
            <input type="text" class="form-control" id="surname" placeholder="Rossi" novalidate>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="text" class="form-control" id="email" placeholder="email@example.com" novalidate>
        </div>
        <div class="mb-3">
            <label for="preferPayment" class="form-label">Metodo di pagamento</label>
            <select id="preferPayment" class="form-select" novalidate>
                <option value="card">Carta di credito</option>
                <option value="paypal">PayPal</option>
                <option value="bank">Bonifico</option>
            </select>
        </div>

        <button type="submit" id="submitRegistration" class="btn btn-primary w-100">salva</button>
    </form>
</template>

<!--template creation password -->
<template id="newPasswordTemplate">
    <h1 class="title">Crea una password:</h1>
    <form id="passwordForm" class="p-4 border rounded bg-light">
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="text" class="form-control" id="password" placeholder="Password" novalidate>
        </div>
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Ripeti Password</label>
            <input type="text" class="form-control" id="confirmPassword" placeholder=" Ripeti Password" novalidate>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="submitPassword">salva</button>
    </form>
</template>

<!--Shop products-->
<template id="shopTemplate">
    <div class="container">
        <div class="imgContainer">
            <div class="imgContainer">
                <img class="imgShop" src="../img/bikini_verde.jpg" alt=" gir with blue bikini">
            </div>
        </div>
        <h2 class="decriptionShop">Bikini Oceano</h2>
        <ul class="colorshop">
            <!--
            <input class="check-shop-color" type="radio" data-value="white" value="color">
        -->
        </ul>
        <h4 class="prizeShop">215 euro</h4>
        <button class="filter-btnShop" id="filterButton" type="button" data-bs-toggle="collapse"
            data-bs-target="#sizeCollapse" id="filterButton" aria-expanded="false" aria-controls="filterCollapse">
            Taglie
        </button>

        <div class="collapse" id="sizeCollapse">
            <div class="card card-body" class="sizeCollapseSection">
                <ul class="sizeFiltersShop">
                    <button class="filter-btn template disable" data-filter-type="size" data-state="unavailable"
                        data-value="xs" value="size">XS</button>
                    <button class="filter-btn template disable" data-filter-type="size" data-state="unavailable"
                        data-value="s" value="size">S</button>
                    <button class="filter-btn template disable" data-filter-type="size" data-state="unavailable"
                        data-value="m" value="size">M</button>
                    <button class="filter-btn template disable" data-filter-type="size" data-state="unavailable"
                        data-value="l" value="size">L</button>
                    <button class="filter-btn template disable" data-filter-type="size" data-state="unavailable"
                        data-value="xl" value="size">XL</button>
                    <button class="filter-btn template disable" data-filter-type="size" data-state="unavailable"
                        data-value="2xl" value="size">2XL</button>
                </ul>
            </div>
            <div class="center">
                <button type="button" class="btn btn-primary w-100" name="cart"> + Carrello</button>
            </div>
        </div>
    </div>
</template>

</template>
