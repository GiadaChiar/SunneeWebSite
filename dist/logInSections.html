<!--buttom riservate area-->
<template id="buttomLink">
    <a class="btn btn-link" href="insert.html">Area Riservata</a>
</template>

<!--Pop-Up-->
<template id="popUp">
    <div class="popup-overlay" id="custom-popup">
        <button class="btn-close" id="closeButton" aria-label="Close" type="button"></button>
        <div class="popup-box" role="alert">
            <h4 id="popUpTitle">Titolo</h4>
            <p id="popUpMessage">Messaggio</p>
        </div>
    </div>
</template>






<!--standard Autentication -->

<!--log in did all controll and client registration -->
<template id="registrationTemplate">
    <h1 class="title">Registrazione:</h1>

    <form id="registration" class="p-4 border rounded bg-light">

        <div class="mb-3">
            <label for="name" class="form-label">Nome</label>
            <input type="text" class="form-control" id="name" placeholder="Luca" novalidate>
        </div>
        <div class="mb-3">
            <label for="surname" class="form-label">Cognome</label>
            <input type="text" class="form-control" id="surname" placeholder="Rossi" novalidate>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="text" class="form-control" id="email" placeholder="email@example.com"novalidate>
        </div>
        <div class="mb-3">
        <label for="preferPayment" class="form-label">Metodo di pagamento</label>
        <select id="preferPayment" class="form-select" novalidate>
            <option value="">Seleziona metodo</option>
            <option value="card">Carta di credito</option>
            <option value="paypal">PayPal</option>
            <option value="bank">Bonifico</option>
        </select>
        </div>

            <button type="submit" id ="submitRegistration" class="btn btn-primary w-100">salva</button>
        </form>
</template>

<!--template creation password -->
<template id="newPasswordTemplate">
    <h1 class="title">Crea una password:</h1>
    <form id="passwordForm" class="p-4 border rounded bg-light">
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="text" class="form-control" id="password" placeholder="Password" novalidate>
        </div>
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Ripeti Password</label>
            <input type="text" class="form-control" id="confirmPassword" placeholder=" Ripeti Password" novalidate>
        </div>
        <button type="submit" class="btn btn-primary w-100" id ="submitPassword">salva</button>
    </form>
</template>
